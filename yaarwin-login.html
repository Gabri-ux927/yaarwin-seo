<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yaarwin Login - Access Your Account</title>
  <meta name="description" content="Login to your Yaarwin account. New user? Register for free. Daily gift codes, instant withdrawals.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: white; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; padding: 20px 0; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .header img { height: 50px; }
    .main-grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin-top: 30px; }
    .app-card, .links-card { flex: 1; min-width: 280px; background: #1e293b; border-radius: 24px; padding: 30px; text-align: center; border: 1px solid #334155; }
    .app-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .app-icon img { width: 50px; }
    .game-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
    .game-tag { background: #334155; padding: 6px 12px; border-radius: 20px; font-size: 13px; }
    .btn { display: block; width: 100%; padding: 14px; background: #22c55e; color: black; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin: 10px 0; text-align: center; }
    .btn-secondary { background: #3b82f6; }
    footer { margin-top: 50px; text-align: center; font-size: 12px; color: #64748b; }
    .gift-code-box { position: fixed; bottom: 20px; left: 20px; background: #1e293b; border-left: 4px solid #22c55e; padding: 10px 15px; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="/logo.png" alt="Yaarwin Logo">
    <h1>Yaarwin</h1>
  </div>

  <div class="main-grid">
    <div class="app-card">
      <div class="app-icon"><img src="/logo.png" alt="Logo"></div>
      <h2>Yaarwin App</h2>
      <div class="game-tags">
        <span class="game-tag">Colour Prediction</span>
        <span class="game-tag">Big/Small</span>
        <span class="game-tag">Numbers 1-9</span>
      </div>
      <a href="#" class="btn" id="downloadBtn">⬇️ Download App</a>
    </div>

    <div class="links-card">
      <h2>🔐 Account Access</h2>
      <a href="#" class="btn" id="loginBtn">🚀 Login to Yaarwin</a>
      <a href="#" class="btn btn-secondary" id="registerBtn">📝 Register New Account</a>
      <p style="margin-top: 20px; font-size: 12px; color: #64748b;">New user? Sign up in 2 minutes. First deposit bonus available.</p>
    </div>
  </div>

  <footer><p>© 2026 Yaarwin | <a href="/">Home</a> | <a href="/yaarwin-game.html">Rules</a> | <a href="/yaarwin-strategy.html">Strategy</a></p></footer>
</div>

<div class="gift-code-box">🎁 Today's Code: <strong id="code">YAARWIN-DAILY</strong> <button id="copyBtn">Copy</button></div>

<script>
  const codes = {'2026-04-30':'YAARWIN-30APR','2026-05-01':'YAARWIN-01MAY'};
  const today = new Date().toISOString().split('T')[0];
  const code = codes[today] || 'YAARWIN-DAILY';
  document.getElementById('code').textContent = code;
  document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(code); alert('Copied: '+code); };
  
  ['loginBtn', 'registerBtn', 'downloadBtn'].forEach(id => {
    document.getElementById(id).addEventListener('click', (e) => {
      e.preventDefault();
      alert('Official Yaarwin link coming soon. Follow Telegram for updates!');
    });
  });
</script>
</body>
</html>
