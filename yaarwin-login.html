<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yaarwin Login - Sign In or Create Free Account</title>
  <meta name="description" content="Login to your Yaarwin account or sign up free in 60 seconds. Access prediction tools and strategies.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: white; padding: 20px; line-height: 1.6; }
    .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; text-align: center; }
    h1 { color: #22c55e; }
    input { display: block; width: 90%; margin: 10px auto; padding: 12px; border-radius: 8px; border: none; }
    button { background: #22c55e; color: black; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .signup-box { background: #334155; padding: 20px; border-radius: 8px; margin-top: 30px; }
    .btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #22c55e; color: black; text-decoration: none; border-radius: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Welcome Back</h1>
  <p>Login to your Yaarwin account</p>

  <form>
    <input type="email" placeholder="Email address" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p><a href="#">Forgot password?</a></p>

  <div class="signup-box">
    <h2>Don't have an account yet?</h2>
    <p>Get started free in 60 seconds. No credit card required.</p>
    <a href="/" class="btn">Create Free Account →</a>
  </div>

  <p style="margin-top: 30px; font-size: 14px;">After logging in, you'll get access to prediction tools, strategies, and tracking.</p>
</div>
</body>
</html>
