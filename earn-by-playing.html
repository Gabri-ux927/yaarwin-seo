<script>
  (function() {
    const YOUR_CODE = '22358100020';
    const agents = { 'kunal': {}, 'professor': {}, 'shivani': {}, 'pragati': {}, 'warrior': {}, 'chikusam': {}, 'aman': {}, 'ganesh': {}, 'chandu': {} };
